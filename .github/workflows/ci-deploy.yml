name: CI & Deploy n8n

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  validate:
    name: Validate configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3
      - name: Validate docker-compose.yml
        run: |
          docker compose -f docker-compose.yml config
      - name: Validate example workflow JSON
        run: |
          if [ -f workflows/example_workflow.json ]; then jq empty workflows/example_workflow.json; else echo "no example workflow"; fi

  deploy:
    name: Deploy to server (manual)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            # clone or update repo on remote
            if [ -d "$HOME/laylaty-n8n" ]; then
              cd $HOME/laylaty-n8n && git pull
            else
              git clone https://github.com/${{ github.repository }} $HOME/laylaty-n8n
              cd $HOME/laylaty-n8n
            fi
            docker compose pull || true
            docker compose up -d
